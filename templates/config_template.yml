# ========== MICROSCOPE CONFIGURATION TEMPLATE ==========
# This template defines the structure for microscope hardware configuration files.
# Replace placeholder values with actual hardware specifications.
#
# IMPORTANT: This file contains ONLY hardware configuration and physical properties.
# - Imaging settings (exposure, gain, white balance): imageprocessing_<microscope>.yml
# - Autofocus parameters: autofocus_<microscope>.yml
#
# All hardware device IDs (objectives, detectors, stages) must match entries in
# the resources_LOCI.yml file located in the resources/ folder.

# ========== MICROSCOPE IDENTIFICATION ==========
microscope:
  name: 'MICROSCOPE_NAME'       # Unique identifier for this microscope (e.g., 'PPM', 'CAMM')
  type: 'MicroscopeType'        # e.g., 'Multimodal', 'UprightBrightfield', 'InvertedFluorescence'
  detector_in_use: null         # Runtime state - leave as null
  objective_in_use: null        # Runtime state - leave as null
  modality: null                # Runtime state - leave as null

# ========== MODALITY-SPECIFIC SETTINGS ==========
# Define each imaging modality available on this microscope.
# Include only properties inherent to the modality itself, not imaging parameters.

modalities:
  # Example: Brightfield transmitted light microscopy
  brightfield:
    type: 'brightfield'

    # Illumination control
    # type: 'device_property' for MM devices with State + Intensity (e.g. Nikon DiaLamp)
    # type: 'analog_voltage' for NI DAQ analog outputs (e.g. LED via voltage)
    illumination:
      device: 'DiaLamp'             # Micro-Manager device name
      type: 'device_property'       # Options: 'device_property', 'analog_voltage'
      state_property: 'State'       # Only for device_property type
      intensity_property: 'Intensity'
      max_intensity: 2100.0         # Maximum intensity value for this device
      label: 'DiaLamp'             # Human-readable name for logging
      # For analog_voltage type, use these instead:
      # type: 'analog_voltage'
      # max_voltage: 5.0

    # Background correction settings
    background_correction:
      enabled: true                 # Enable/disable background correction
      method: 'divide'              # Options: 'divide', 'subtract', 'none'
      base_folder: "D:/path/to/backgrounds"
      # Path pattern: {base_folder}/{microscope}/brightfield/{magnification}x/{detector}/background.tif

  # Example: Polarized light microscopy (PPM)
  ppm:
    type: 'polarized'

    # PPM optics type. Set to "NA" to disable polarization optics (brightfield only).
    # Read by: microscope_control/hardware/pycromanager.py (_find_rotation_stage_config)
    optics: 1

    # PIZ rotation stage calibration offset (hardware position for 0 deg reference).
    # Written by: PolarizerCalibrationWorkflow.java (writeOffsetToYaml)
    # Read by: microscope_control/hardware/pycromanager.py (_create_rotation_stage)
    # Formula: hardware_position = (optical_angle * units_per_deg) + pizstage_offset
    pizstage_offset: 50280.0

    # Rotation stage for polarizer control (separate from XYZ stage)
    rotation_stage:
      device: 'LOCI_STAGE_PI_001'   # Must match resources_LOCI.yml
      type: 'polarizer'             # Options: 'polarizer', 'waveplate', 'filter_wheel'

    # Polarizer rotation angles
    rotation_angles:
      - name: 'negative'
        tick: -7                    # Device-specific units (e.g., 1 tick = 1 degree)
      - name: 'crossed'
        tick: 0
      - name: 'positive'
        tick: 7
      - name: 'uncrossed'
        tick: 90

    background_correction:
      enabled: true
      method: 'divide'
      base_folder: "D:/path/to/backgrounds"
      # Path pattern: {base_folder}/polarized/{angle_name}_background.tif

  # ========================================================================
  # Example: Widefield multi-channel immunofluorescence (IF)
  # ------------------------------------------------------------------------
  # Declare a `channels:` library under a widefield modality to opt into
  # the multi-channel acquisition path. Each channel is a fully
  # self-contained description: id, display name, default exposure,
  # ordered Micro-Manager ConfigGroup presets, and ordered device
  # property writes. The QPSC Java and Python base layers iterate this
  # list and drive any vendor's illumination hardware uniformly -- no
  # vendor-specific code is required.
  #
  # Schema reference: see the "Multi-Channel Widefield IF Schema" section
  # of microscope_configurations/README.md, and
  # QPSC/docs/multichannel-if-overview.md for the cross-repo design.
  #
  # The block below is a copy-ready Fluorescence modality example. Rename
  # the modality key, channel ids, preset names, and device properties to
  # match your microscope, then uncomment it and add a matching
  # acquisition profile below.
  # ------------------------------------------------------------------------
  # Fluorescence:
  #   type: 'widefield'
  #
  #   # Illumination control for the epi path. Points at a single MM device
  #   # that represents the combined epi light source (e.g. a LAPP combiner).
  #   illumination:
  #     device: 'LappMainBranch1'
  #     type: 'device_property'
  #     state_property: 'State'
  #     intensity_property: 'State'
  #     max_intensity: 1.0
  #     label: 'Epi LED'
  #
  #   background_correction:
  #     enabled: false
  #     method: 'divide'
  #     base_folder: ''
  #
  #   # Channel library. Each entry is one acquisition step. The
  #   # mm_setup_presets and device_properties run INSIDE the per-tile
  #   # loop, once per channel per tile. Profile-level mm_setup_presets
  #   # (see the acquisition_profiles section) run ONCE before the loop
  #   # starts, for things like opening the epi shutter and selecting the
  #   # epi camera port.
  #   channels:
  #     - id: DAPI
  #       display_name: 'DAPI (385 nm)'
  #       exposure_ms: 100
  #       # ConfigGroup presets applied via core.setConfig(group, preset).
  #       # These cover filter turrets, light paths, and channel-selector
  #       # groups that have already been wrapped as MM presets.
  #       mm_setup_presets:
  #         - { group: 'Filter Turret', preset: 'Single photon LED-DA FI TR Cy5-B' }
  #       # Direct device-property writes applied via
  #       # core.setProperty(device, property, value). Used for fine-grained
  #       # control that is not wrapped as a ConfigGroup, e.g. per-LED
  #       # wavelength intensity on a multi-wavelength source. `value` is
  #       # stringified on the Java side, so any MM property type works.
  #       device_properties:
  #         - { device: DLED, property: Intensity-385nm, value: 25 }
  #         - { device: DLED, property: Intensity-475nm, value: 0 }
  #         - { device: DLED, property: Intensity-550nm, value: 0 }
  #         - { device: DLED, property: Intensity-621nm, value: 0 }
  #       # Optional dumb-sleep (ms) after presets + properties have been
  #       # applied, for hardware whose isBusy() returns too early.
  #       # settle_ms: 50
  #     - id: FITC
  #       display_name: 'FITC (475 nm)'
  #       exposure_ms: 80
  #       mm_setup_presets:
  #         - { group: 'Filter Turret', preset: 'Single photon LED-DA FI TR Cy5-B' }
  #       device_properties:
  #         - { device: DLED, property: Intensity-385nm, value: 0 }
  #         - { device: DLED, property: Intensity-475nm, value: 30 }
  #         - { device: DLED, property: Intensity-550nm, value: 0 }
  #         - { device: DLED, property: Intensity-621nm, value: 0 }

  # ========================================================================
  # Example: Combined brightfield + immunofluorescence (BF+IF)
  # ------------------------------------------------------------------------
  # `type: bf_if` marks a modality as combined BF + IF for single-camera
  # scopes. There is NO separate code path: BF is expressed as a regular
  # entry in the channels library whose mm_setup_presets happen to switch
  # the light path to the transmitted port and whose device_properties
  # happen to drive the transmitted lamp. Downstream everything (tile
  # loop, stitcher, multichannel merger) treats BF identically to every
  # fluorescence channel.
  #
  # The BF channel should be the first entry in the library by convention,
  # so the channel picker UI lists it at the top. Per-objective BF lamp
  # tuning lives in the profile-level channel_overrides below, NOT in the
  # library entry itself.
  # ------------------------------------------------------------------------
  # BF_IF:
  #   type: 'bf_if'
  #
  #   illumination:
  #     device: 'LappMainBranch1'
  #     type: 'device_property'
  #     state_property: 'State'
  #     intensity_property: 'State'
  #     max_intensity: 1.0
  #     label: 'Epi LED'
  #
  #   background_correction:
  #     enabled: false
  #     method: 'divide'
  #     base_folder: ''
  #
  #   channels:
  #     - id: BF
  #       display_name: 'Brightfield'
  #       exposure_ms: 10
  #       # The "BF Camera" light-path preset routes the image to the BF
  #       # port and (on this example scope) also toggles DiaLamp State=1.
  #       # Close the epi shutter defensively so no epi LED light leaks
  #       # into the BF integration.
  #       mm_setup_presets:
  #         - { group: 'Light Path',  preset: '2-R100 (BF Camera)' }
  #         - { group: 'Epi Shutter', preset: 'Closed' }
  #       device_properties:
  #         # Default transmitted-lamp intensity. Per-objective tuning
  #         # lives in channel_overrides.BF.device_properties on each
  #         # BF_IF_<Nx> profile below.
  #         - { device: DiaLamp, property: Intensity, value: 500 }
  #         # Defensive: make sure no epi LED is lit during BF integration.
  #         - { device: DLED, property: Intensity-385nm, value: 0 }
  #         - { device: DLED, property: Intensity-475nm, value: 0 }
  #         - { device: DLED, property: Intensity-550nm, value: 0 }
  #         - { device: DLED, property: Intensity-621nm, value: 0 }
  #     - id: DAPI
  #       display_name: 'DAPI (385 nm)'
  #       exposure_ms: 100
  #       # IF channels switch the light path back to the epi camera port,
  #       # open the epi shutter, pick the filter cube, then drive the LED.
  #       mm_setup_presets:
  #         - { group: 'Light Path',    preset: '2-R100 (Epi Camera)' }
  #         - { group: 'Epi Shutter',   preset: 'Open' }
  #         - { group: 'Filter Turret', preset: 'Single photon LED-DA FI TR Cy5-B' }
  #       device_properties:
  #         # Turn the transmitted lamp fully off during epi acquisition.
  #         - { device: DiaLamp, property: State, value: 0 }
  #         - { device: DLED, property: Intensity-385nm, value: 25 }
  #         - { device: DLED, property: Intensity-475nm, value: 0 }
  #         - { device: DLED, property: Intensity-550nm, value: 0 }
  #         - { device: DLED, property: Intensity-621nm, value: 0 }

  # Example: Second Harmonic Generation (SHG) multiphoton imaging
  # The Setup Wizard collects these fields when you choose type 'multiphoton'.
  # Fields marked [manual] are not collected by the wizard -- edit YAML directly.
  shg:
    type: 'multiphoton'

    # Laser control (required)
    laser:
      device: 'Chameleon'           # Micro-Manager device name
      wavelength_nm: 800            # Default operating wavelength
      wavelength_range_nm: [690, 1040]  # Tunable range

    # Pockels cell for laser power modulation (required)
    pockels_cell:
      device: 'PockelsCell-Dev1ao1' # Analog output device
      type: 'analog_voltage'        # Control type
      property: 'Voltage'           # MM property name
      max_voltage: 1.0              # Safety limit
      label: 'Pockels Cell'

    # PMT detector (required)
    # type: 'dcc' for Becker & Hickl DCC-100 (single module on/off + per-connector gain)
    # type: 'dcu' for Becker & Hickl DCU (per-channel enable/gain/cooling)
    pmt:
      device: 'DCC100'              # PMT controller device
      type: 'dcc'                   # Options: 'dcc', 'dcu'
      connector: 1                  # Controller connector/channel number
      max_gain_percent: 100.0       # Safety limit for high-voltage

    # Scan magnifier / zoom (optional)
    zoom:
      device: 'OSc-Magnifier'       # Leave blank if not available
      range: [0.5, 10.0]            # Min/max zoom factors
      default: 1.0                  # Default zoom

    # Laser safety shutter (optional)
    shutter:
      device: 'UniblitzShutter'

    # Digital IO shutter [manual] -- for NI DAQ digital shutter control
    # digital_shutter:
    #   device: 'Shutters-DigitalIODev1'
    #   open_state: 3
    #   closed_state: 0

    background_correction:
      enabled: false                # Typically disabled for multiphoton

  # Example: Fluorescence imaging
  fluorescence:
    type: 'fluorescence'

    # Light source
    lamp:
      device: 'Mercury-Lamp'
      control_type: 'digital'

    # Filter control
    filter_wheel:
      device: 'FilterWheel-Device'
      filters:
        - name: 'DAPI'
          position: 1
          excitation_nm: 350
          emission_nm: 470
        - name: 'FITC'
          position: 2
          excitation_nm: 488
          emission_nm: 525

    background_correction:
      enabled: true
      method: 'subtract'
      base_folder: "D:/path/to/backgrounds"

# ========== AVAILABLE HARDWARE ==========
# Lists all hardware components available on this microscope.
# All combinations of modality/objective/detector are valid unless
# specifically restricted by compatible_modalities in detectors section.

hardware:
  # Objective lenses
  objectives:
    - id: 'LOCI_OBJECTIVE_001'      # Must match resources_LOCI.yml entry
      # Pixel size for camera-based detection (fixed)
      pixel_size_xy_um:
        LOCI_DETECTOR_001: 1.105    # Detector ID: pixel size in micrometers
        LOCI_DETECTOR_002: 0.876

    - id: 'LOCI_OBJECTIVE_002'
      pixel_size_xy_um:
        LOCI_DETECTOR_001: 0.553
        LOCI_DETECTOR_002: 0.438
      # For scanning modalities with variable pixel size
      scan_parameters:
        base_fov_um: 500            # Field of view at zoom = 1.0
        # Actual pixel size = base_fov_um / (scan_resolution * zoom_factor)

    - id: 'LOCI_OBJECTIVE_003'
      pixel_size_xy_um:
        LOCI_DETECTOR_001: 0.277
        LOCI_DETECTOR_002: 0.219

  # Detectors (cameras, PMTs, etc.)
  detectors:
    - 'LOCI_DETECTOR_001'           # Camera for brightfield/fluorescence
    - 'LOCI_DETECTOR_002'           # Alternative camera (e.g., RGB prism)
    - 'LOCI_PMT_001'                # PMT for multiphoton imaging

# ========== DETECTOR CONFIGURATION (id_detector) ==========
# Define each detector with its camera_type so the hardware abstraction
# layer creates the correct Camera subclass automatically.
# camera_type options: 'generic', 'jai', 'laser_scanning'
id_detector:
  LOCI_DETECTOR_001:
    name: 'Primary Camera'
    camera_type: 'generic'          # Standard area camera (CCD/sCMOS)
    device: 'Camera-Device-Name'    # MM device name
    width_px: 2048
    height_px: 2048
    flip_x: false                   # Optical flip (NOT stage inversion)
    flip_y: false
    compatible_modalities:
      - 'brightfield'
      - 'fluorescence'

  # LOCI_PMT_001:
  #   name: 'Scanning PMT'
  #   camera_type: 'laser_scanning'  # Galvo scan engine (e.g. OpenScan OSc-LSM)
  #   device: 'OSc-LSM'
  #   width_px: 512
  #   height_px: 512
  #   base_pixel_size_um: 0.509     # Pixel size at base resolution (e.g. 256)
  #   flip_x: false
  #   flip_y: false
  #   compatible_modalities:
  #     - 'shg'
  #     - '2p'

# ========== ACQUISITION PROFILES ==========
# Each profile maps a --scan-type name to hardware configuration.
# mm_setup_presets are applied in order to set light path, filters, etc.
# acquisition_profiles:
#   bf_20x:
#     modality: 'brightfield'
#     objective: 'LOCI_OBJECTIVE_001'
#     detector: 'LOCI_DETECTOR_001'
#     illumination_intensity: 1200
#     mm_setup_presets:
#       - group: 'Light Path'
#         preset: '2-R100 (BF Camera)'
#       - group: 'Lens Turret'
#         preset: 'Nikon 20x 0.75NA air'
#
#   # ----------------------------------------------------------------------
#   # Example: multi-channel widefield fluorescence profile
#   # ----------------------------------------------------------------------
#   # Consumes the Fluorescence channel library declared in the modalities
#   # section above. The profile-level mm_setup_presets run ONCE before the
#   # tile loop starts (light path, epi shutter, laser/LED combiner). The
#   # per-channel mm_setup_presets and device_properties run INSIDE the
#   # tile loop, once per channel per tile.
#   Fluorescence_20x:
#     modality: 'Fluorescence'
#     detector: 'LOCI_DETECTOR_001'
#     mm_setup_presets:
#       - { group: 'Light Path',  preset: '2-R100 (Epi Camera)' }
#       - { group: 'Epi Shutter', preset: 'Open' }
#       - { group: 'Epi Channel: Laser/LED (LAPP)', preset: 'Epi LED (DLEDI)' }
#     illumination_intensity: 1.0
#     # Optional subset filter. If omitted, every channel from the modality
#     # library is acquired in library order. If present, only the listed
#     # ids are acquired, in the given order.
#     channels: [DAPI, FITC, TRITC, Cy5]
#     # Optional per-channel overrides. Each entry may override exposure_ms
#     # and/or device_properties. The device_properties override uses the
#     # extended "replace by (device, property), append on miss" merge rule:
#     # for each override entry, the channel library's existing entries are
#     # searched for a matching (device, property) tuple; if matched, the
#     # value is replaced in place; if not matched, the entry is appended.
#     channel_overrides:
#       Cy5:
#         exposure_ms: 250
#       # Uncomment to tune one property on one channel for this profile
#       # without redeclaring the whole channel in the modality library:
#       # DAPI:
#       #   device_properties:
#       #     - { device: DLED, property: Intensity-385nm, value: 35 }
#
#   # ----------------------------------------------------------------------
#   # Example: combined brightfield + immunofluorescence profile
#   # ----------------------------------------------------------------------
#   # Consumes the BF_IF channel library from the modalities section above.
#   # The BF channel is the first entry in the subset list and therefore
#   # acquired first per tile. The profile uses
#   # channel_overrides.BF.device_properties to retune the transmitted-lamp
#   # intensity for this objective -- the single-line pattern used by
#   # config_OWS3.yml's BF_IF_10x profile to keep the BF channel library
#   # entry itself free of per-objective tuning.
#   BF_IF_20x:
#     modality: 'BF_IF'
#     detector: 'LOCI_DETECTOR_001'
#     mm_setup_presets:
#       - { group: 'Epi Channel: Laser/LED (LAPP)', preset: 'Epi LED (DLEDI)' }
#     illumination_intensity: 1.0
#     channels: [BF, DAPI, FITC, TRITC, Cy5]
#     channel_overrides:
#       BF:
#         exposure_ms: 20
#         # Replaces the BF channel library's (DiaLamp, Intensity) entry
#         # in place, preserving the order of the rest of the property
#         # list. This is the main reason the extended device_properties
#         # override schema exists: per-objective lamp tuning without
#         # redeclaring the whole BF channel.
#         device_properties:
#           - { device: DiaLamp, property: Intensity, value: 70 }
#       Cy5:
#         exposure_ms: 250

# ========== PMT SAFETY (required for systems with PMTs) ==========
# Devices disabled/closed BEFORE any light path or illumination change.
# All states are explicit strings, never booleans.
# pmt_safety:
#   detector_shutter:
#     device: 'Arduino-Switch'
#     preset_group: 'Detector Shutters'    # MM ConfigGroup for atomic set
#     closed_preset: 'Closed and Off'
#   laser_shutter:
#     device: 'LaserShutter'
#     closed_state: '0'

# ========== STAGE CONFIGURATION ==========
# XYZ stage for sample positioning only.
# Device mappings (x_device, y_device, z_device) are defined in resources_LOCI.yml.
# Rotation stages are defined in modality sections, NOT here.

stage:
  stage_id: 'LOCI_STAGE_001'        # Must match resources_LOCI.yml entry

  # Movement limits in micrometers
  limits:
    x_um:
      low: -36000                   # Minimum X position
      high: 34000                   # Maximum X position
    y_um:
      low: -39000
      high: 34000
    z_um:
      low: -5601                    # Stage raised (sample close to objective)
      high: -1600                   # Stage lowered (sample far from objective)
    f_um:                           # Optional: separate focus axis if stage has one
      low: -18000
      high: 0

  # ========== STAGE INSERT CONFIGURATION (Optional) ==========
  # For microscopes with interchangeable slide holders.
  # Defines the viewable aperture (light transmission window) for each insert type.
  # Only the aperture area is shown in the Stage Map visualization.
  #
  # This entire block is OPTIONAL. When `stage.inserts` is absent, the
  # Stage Map synthesizes a single-slide insert at the center of
  # `stage.limits` using `slide_size_um` as the slide footprint. Simple
  # setups with a single slide in the middle of the stage can omit the
  # entire `inserts:` block below and rely on the fallback. Multi-slide
  # holders and scopes with offset apertures still need an explicit
  # calibrated block.
  #
  # CALIBRATION PROCEDURE (using 4 reference points):
  #   Center the objective on each edge and record stage positions:
  #   1. aperture_left_x_um:   Left edge of aperture (stage X when edge is centered in FOV)
  #   2. aperture_right_x_um:  Right edge of aperture
  #   3. slide_top_y_um:       Top edge of slide glass
  #   4. slide_bottom_y_um:    Bottom edge of slide glass
  #
  # The system calculates aperture dimensions from these measurements.

  inserts:
    # Safety margin around slides for "legal zone" computation (micrometers)
    slide_margin_um: 2000

    # Default insert configuration to use
    default: single_h

    # Insert configurations
    configurations:
      single_h:
        name: "Single Slide (Horizontal)"
        description: "Standard single slide holder with horizontal orientation"

        # Calibration reference points (measured in micrometers)
        aperture_left_x_um: 33404       # Stage X when left aperture edge is centered
        aperture_right_x_um: -35085     # Stage X when right aperture edge is centered
        aperture_top_y_um: 33007        # Stage Y when top aperture edge is centered
        aperture_bottom_y_um: -38294    # Stage Y when bottom aperture edge is centered
        slide_top_y_um: 12220           # Stage Y when top of slide glass is centered
        slide_bottom_y_um: -11654       # Stage Y when bottom of slide glass is centered

        # Estimated aperture height (less critical for accuracy)
        aperture_height_mm: 60.0        # Vertical opening size in millimeters

        # Standard slide dimensions
        slide_width_mm: 75              # 3 inches (horizontal orientation)
        slide_height_mm: 25             # 1 inch

      single_v:
        name: "Single Slide (Vertical)"
        description: "Standard single slide holder with vertical orientation"

        aperture_left_x_um: 0
        aperture_right_x_um: 60000
        slide_top_y_um: 0
        slide_bottom_y_um: 75000        # Slide is 75mm tall when vertical

        aperture_height_mm: 55.0
        slide_width_mm: 25              # Rotated dimensions
        slide_height_mm: 75

      quad_v:
        name: "Four Slides (Vertical)"
        description: "Four slides arranged vertically"

        aperture_left_x_um: 0
        aperture_right_x_um: 120000
        slide_top_y_um: 0
        slide_bottom_y_um: 75000

        aperture_height_mm: 55.0
        slide_width_mm: 25
        slide_height_mm: 75

        # Multiple slide configuration
        slide_spacing_mm: 30.0          # Center-to-center distance between slides
        num_slides: 4

# ========== GENERAL SETTINGS ==========

# Standard microscope slide dimensions
slide_size_um:
  x: 40000      # 40mm = 40,000 micrometers
  y: 20000      # 20mm

# Optional: Objective turret/slider control
objective_slider:
  device: 'Turret:O:35'             # Micro-Manager device name
  label_device: 'Label'             # Device that reports current position

# ========== CONFIGURATION NOTES ==========
#
# 1. SEPARATION OF CONCERNS:
#    - This file: Hardware configuration and physical properties only
#    - imageprocessing_<microscope>.yml: Exposure, gain, white balance settings
#    - autofocus_<microscope>.yml: Autofocus parameters per objective
#
# 2. HARDWARE REFERENCES:
#    - All device IDs must match entries in resources_LOCI.yml
#    - Objective IDs: LOCI_OBJECTIVE_<manufacturer>_<magnification>_<variant>_<number>
#    - Detector IDs: LOCI_DETECTOR_<manufacturer>_<number>
#    - Stage IDs: LOCI_STAGE_<manufacturer>_<number>
#
# 3. PIXEL SIZE:
#    - For fixed detectors: Specify pixel_size_xy_um per objective/detector pair
#    - For scanning modalities: Use scan_parameters with base_fov_um
#    - Pixel size = base_fov_um / (scan_resolution * zoom_factor)
#
# 4. BACKGROUND CORRECTION:
#    - Each modality defines its own correction method
#    - Methods: 'divide' (flatfield), 'subtract' (dark subtraction), 'none'
#    - Path patterns vary by modality (see examples above)
#
# 5. STAGE CONFIGURATION:
#    - XYZ stages: Sample positioning only (defined here)
#    - Rotation stages: Part of modality definition (e.g., polarizer rotation)
#    - Stage limits should match or exceed aperture calibration bounds
#
# 6. MODALITY TYPES:
#    - 'brightfield': Transmitted light with lamp control
#    - 'polarized': Requires rotation_stage and rotation_angles
#    - 'fluorescence': Legacy single-snap fluorescence (filter_wheel based)
#    - 'widefield': Multi-channel widefield IF with a channels: library
#    - 'bf_if':     Combined BF + IF for single-camera scopes; uses the
#                   same channels: library schema as 'widefield'. The BF
#                   step is just the first entry in the channel library.
#    - 'multiphoton': Laser-based with optional magnification_control
