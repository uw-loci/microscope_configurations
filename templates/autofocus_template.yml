# ========== AUTOFOCUS CONFIGURATION TEMPLATE (schema v2) ==========
#
# This template produces a modality-aware autofocus config for a new
# microscope. Rename to autofocus_<microscope>.yml (e.g. autofocus_PPM.yml)
# and update objective IDs to match config_<microscope>.yml.
#
# Schema layout has three sections:
#
#   autofocus_settings  -- per-objective HARDWARE params (search range,
#                          steps, sweep). These describe what the stage and
#                          objective can safely do; sample physics lives in
#                          strategies/modalities below.
#
#   strategies          -- LIBRARY of named recipes for "is this image
#                          focusable?" + "what's the focus score?". Each
#                          entry binds a validity check, a score metric,
#                          and a failure mode (defer / proceed / manual).
#
#   modalities          -- BINDINGS that say which strategy each modality
#                          should use, with optional per-modality overrides
#                          of validity_params. Modality keys match the
#                          ModalityRegistry prefix list (longest-prefix
#                          wins, case-insensitive).
#
# Schema v1 (the bare per-objective rows with texture_threshold and
# tissue_area_threshold inline) is still parseable as a fallback. Loaders
# that see schema_version: 2 prefer the strategy library + modality
# bindings; loaders that don't see it fall back to the v1 inline fields.
#
# Design doc:
#   claude-reports/2026-04-13_modality-aware-autofocus-design.md
#
# Authoring guide:
#   LLM_CONFIG_GUIDE.md (section 2)
#
# ========== PARAMETER DESCRIPTIONS ==========
#
# STANDARD AUTOFOCUS (initial focus on first tissue position):
#   n_steps: Number of Z positions to sample (higher = more accurate but slower)
#     - Low mag (4x-10x): 7-15 steps
#     - Mid mag (20x-40x): 15-40 steps
#     - High mag (60x+): 15-50 steps
#   search_range_um: Total Z range to search in micrometers
#     - Low mag: 50-100 um (larger DoF)
#     - Mid mag: 25-50 um
#     - High mag: 10-25 um (smaller DoF)
#   interp_strength: Interpolation density factor (typical: 50-200)
#   interp_kind: Interpolation method - 'linear', 'quadratic', or 'cubic'
#
# SWEEP DRIFT CHECK (in-acquisition focus correction):
#   sweep_range_um: Total Z range for drift check (default 10 = +/-5 um)
#     - Wider for low mag (12-20 um), narrower for high mag (6-10 um)
#   sweep_n_steps: Number of Z positions to sample for drift
#     - 3 steps is enough for most objectives; use 4+ on tight-DoF (60x+)
#
# SHARED:
#   n_tiles: Autofocus runs every N tiles (lower = more frequent)
#     - Flat samples: 5-10
#     - Warped samples: 1-3
#   score_metric: Used only by v1 fallback loader; in v2 this is set
#                 per-strategy in the strategies block.
#
# GAP DETECTION (safety nets beyond the spatial grid):
#   gap_index_multiplier: Force AF after this many x n_tiles without AF (default 3)
#     - Set to 0 to disable; WARNING: 1 recreates the "vertical pillar" pattern
#   gap_spatial_multiplier: Force AF when distance > this x af_min_distance (default 2.0)

schema_version: 2

# ========== PER-OBJECTIVE HARDWARE PARAMETERS ==========
# One row per objective. Objective IDs must match config_<SCOPE>.yml
# and the corresponding entries in resources_LOCI.yml.
autofocus_settings:
  # Example: Low magnification objective (4x-10x) -- large DoF, fewer steps
  - objective: LOCI_OBJECTIVE_001
    calibrated: true
    n_steps: 9
    search_range_um: 15.0
    n_tiles: 5
    interp_strength: 100
    interp_kind: quadratic
    score_metric: normalized_variance
    texture_threshold: 0.005
    tissue_area_threshold: 0.2
    sweep_range_um: 12.0
    sweep_n_steps: 3
    gap_index_multiplier: 3
    gap_spatial_multiplier: 2.0

  # Example: Medium magnification objective (20x-40x)
  - objective: LOCI_OBJECTIVE_002
    calibrated: true
    n_steps: 35
    search_range_um: 50.0
    n_tiles: 5
    interp_strength: 100
    interp_kind: quadratic
    score_metric: laplacian_variance
    texture_threshold: 0.010
    tissue_area_threshold: 0.2
    sweep_range_um: 10.0
    sweep_n_steps: 3
    gap_index_multiplier: 3
    gap_spatial_multiplier: 2.0

  # Example: High magnification objective (60x-100x) -- tight DoF, extra sweep point
  - objective: LOCI_OBJECTIVE_003
    calibrated: true
    n_steps: 35
    search_range_um: 50.0
    n_tiles: 5
    interp_strength: 100
    interp_kind: quadratic
    score_metric: laplacian_variance
    texture_threshold: 0.015
    tissue_area_threshold: 0.2
    sweep_range_um: 10.0
    sweep_n_steps: 4
    gap_index_multiplier: 3
    gap_spatial_multiplier: 2.0

# ========== STRATEGY LIBRARY (v2) ==========
# Each strategy is a self-contained recipe. validity_check + score_metric
# are tags consumed by microscope_control/autofocus/strategies.py, which
# maps them to concrete Python implementations. In most cases you can
# copy this block unchanged across scopes and only adjust the per-modality
# bindings below. Tune validity_params only if your scope's noise floor
# or background level differs from the defaults.
#
# on_failure values:
#   defer   -- skip this tile and try the next one (current dense behavior)
#   proceed -- run AF anyway (sparse samples often focus fine even when
#              the gate is borderline)
#   manual  -- pop the manual focus dialog immediately
strategies:
  dense_texture:
    description: >
      H&E, IHC, PPM, confluent IF. Requires both sufficient gradient
      texture AND a significant tissue-area fraction.
    score_metric: laplacian_variance
    validity_check: texture_and_area
    validity_params:
      texture_threshold: 0.010
      tissue_area_threshold: 0.200
      rgb_brightness_threshold: 240.0
      tissue_mask_range: [0.10, 0.90]
      median_floor: 15.0
    on_failure: defer

  sparse_signal:
    description: >
      Scattered fluorescent objects (beads, pollen, single cells on a
      dark background). No area gate. Validity = count of bright local
      maxima above an adaptive (median + k*MAD) background. Brightness
      check uses dynamic range, NOT a median floor, so the dim-image
      exposure-doubling loop does not fire on samples whose backgrounds
      are intentionally near zero.
    score_metric: laplacian_variance
    validity_check: bright_spot_count
    validity_params:
      spot_sigma_above_bg: 5.0
      spot_min_separation_px: 8
      min_spots: 3
      min_peak_intensity: 20.0
      bright_pixel_floor: 50.0
    on_failure: proceed

  dark_field:
    description: >
      Background-dominated signal where neither a mid-gray mask nor a
      bright-spot count fits (e.g. SHG, dark-field contrast). Whole-FOV
      gradient magnitude. Validity = total gradient energy above a floor.
    score_metric: brenner_gradient
    validity_check: total_gradient_energy
    validity_params:
      min_gradient_energy: 0.002
    on_failure: proceed

  manual_only:
    description: >
      Skip auto entirely. Always prompts the user. Used for training
      runs, edge-case samples, or when the user does not trust auto for
      this modality.
    score_metric: none
    validity_check: always_false
    validity_params: {}
    on_failure: manual

# ========== PER-MODALITY STRATEGY BINDINGS (v2) ==========
# Modality keys are matched against ModalityRegistry's longest-prefix-
# wins lookup (case-insensitive). overrides.validity_params merges into
# the named strategy's defaults. To bind a modality to a custom strategy
# at acquisition time, use the --af-strategy CLI flag (set via the
# acquisition dialog autofocus dropdown).
#
# Add one binding per modality prefix your scope actually uses.
# Unlisted modalities fall back to dense_texture via the v1 compat path.
modalities:
  bf:
    strategy: dense_texture

  brightfield:
    strategy: dense_texture

  ppm:
    strategy: dense_texture
    overrides:
      validity_params:
        # Polarized images have wider intensity ranges
        tissue_mask_range: [0.05, 0.95]
        texture_threshold: 0.005

  fl:
    strategy: sparse_signal

  fluorescence:
    strategy: sparse_signal

  bf_if:
    strategy: dense_texture
    overrides:
      validity_params:
        # IF-heavy slides have sparser tissue than pure H&E
        tissue_area_threshold: 0.10

  lsm:
    strategy: dark_field

  shg:
    strategy: dark_field

  '2p':
    strategy: dark_field

  confocal:
    strategy: dark_field

# ========== TUNING GUIDELINES ==========
#
# 1. START WITH DEFAULTS:
#    - Copy this template verbatim, then adjust per-objective rows to
#      match your stage and objective lineup. Leave strategies/modalities
#      alone until you see a real failure.
#
# 2. OPTIMIZE FOR SPEED vs ACCURACY:
#    - Faster: reduce n_steps, increase n_tiles, drop sweep_n_steps to 3
#    - Accurate: increase n_steps, decrease n_tiles
#
# 3. HANDLE DIFFICULT SAMPLES:
#    - Sparse fluorescence (beads, pollen): bind fluorescence -> sparse_signal
#    - Warped slides: decrease n_tiles (refocus more often)
#    - Noisy backgrounds: try dark_field strategy or tune spot thresholds
#
# 4. VALIDATE BINDINGS:
#    - After a run, check tile_measurements.json: each tile has
#      af_strategy: <name>. If it says dense_texture when you expected
#      sparse_signal, your binding prefix is wrong or too short.
#
# 5. --af-strategy OVERRIDE:
#    - The acquisition dialog dropdown sends --af-strategy at runtime,
#      which overrides the binding for that acquisition only. Useful for
#      testing new strategies without editing YAML.
