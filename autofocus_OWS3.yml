# ========== AUTOFOCUS CONFIGURATION ==========
# Autofocus parameters per objective
# These settings control autofocus behavior during image acquisition
#
# STANDARD AUTOFOCUS (initial focus on first tissue position):
#   n_steps: Number of Z positions to sample (higher = more accurate but slower)
#   search_range_um: Total Z range to search in micrometers
#   interp_strength: Interpolation density factor (typical: 50-200)
#   interp_kind: Interpolation method - 'linear', 'quadratic', or 'cubic'
#
# SWEEP DRIFT CHECK (in-acquisition focus correction):
#   sweep_range_um: Total Z range for drift check (default 10 = +/-5um)
#   sweep_n_steps: Number of Z positions to sample (default 6)
#
# SHARED:
#   n_tiles: Autofocus runs every N tiles (lower = more frequent)
#   score_metric: 'normalized_variance' (recommended), 'laplacian_variance',
#                 'sobel', 'brenner_gradient', or 'p98_p2'
#   texture_threshold: Min texture variance for tissue detection (0.005-0.030)
#   tissue_area_threshold: Min tissue coverage fraction (0.05-0.30)

autofocus_settings:
- objective: 0.5NA_AIR_10x
  calibrated: true
  n_steps: 9
  search_range_um: 15.0
  n_tiles: 5
  interp_strength: 100
  interp_kind: quadratic
  score_metric: normalized_variance
  texture_threshold: 0.005
  tissue_area_threshold: 0.2
  sweep_range_um: 20.0
  sweep_n_steps: 15
