  sweep_range_um: 10.0
  sweep_n_steps: 4
  edge_retries: 2
  gap_index_multiplier: 3
  gap_spatial_multiplier: 2.0
strategies:
  dense_texture:
    description: Current behavior. Works for H&E, IHC, PPM, confluent IF. Requires
      both sufficient gradient texture AND a significant tissue-area fraction.
    score_metric: laplacian_variance
    validity_check: texture_and_area
    validity_params:
      texture_threshold: 0.01
      tissue_area_threshold: 0.2
      rgb_brightness_threshold: 240.0
      tissue_mask_range:
      - 0.1
      - 0.9
      median_floor: 15.0
    on_failure: defer
  sparse_signal:
    description: For scattered fluorescent objects (beads, pollen, single cells on
      a dark background). No area gate. Validity = count of bright local maxima above
      an adaptive (median + k*MAD) background. Brightness check uses dynamic range,
      NOT a median floor, so the dim-image exposure-doubling loop does not fire on
      samples whose backgrounds are intentionally near zero.
    score_metric: laplacian_variance
    validity_check: bright_spot_count
    validity_params:
      spot_sigma_above_bg: 5.0
      spot_min_separation_px: 8
      min_spots: 3
      min_peak_intensity: 20.0
      bright_pixel_floor: 50.0
    on_failure: proceed
  dark_field:
    description: Background-dominated signal where neither a mid-gray mask nor a bright-spot
      count fits (e.g. SHG, dark-field contrast). Whole-FOV gradient magnitude. Validity
      = total gradient energy above a floor.
    score_metric: brenner_gradient
    validity_check: total_gradient_energy
    validity_params:
      min_gradient_energy: 0.002
    on_failure: proceed
  manual_only:
    description: Skip auto entirely. Always prompts the user. Used for training runs,
      edge-case samples, or when the user does not trust auto for this modality.
    score_metric: none
    validity_check: always_false
    validity_params: {
      }
    on_failure: manual
modalities:
  bf:
    strategy: sparse_signal
  brightfield:
    strategy: sparse_signal
  ppm:
    strategy: dense_texture
    overrides:
      validity_params:
        tissue_mask_range:
        - 0.05
        - 0.95
        texture_threshold: 0.005
  fl:
    strategy: sparse_signal
    overrides:
      validity_params:
        spot_sigma_above_bg: 4.0
        min_spots: 2
  fluorescence:
    strategy: sparse_signal
    overrides:
      validity_params:
        spot_sigma_above_bg: 4.0
        min_spots: 2
  bf_if:
    strategy: dense_texture
    overrides:
      validity_params:
        tissue_area_threshold: 0.1
  lsm:
    strategy: dark_field
  shg:
    strategy: dark_field
  2p:
    strategy: dark_field
  confocal:
    strategy: dark_field
