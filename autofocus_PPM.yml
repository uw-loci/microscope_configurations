# ========== AUTOFOCUS CONFIGURATION ==========
# Autofocus parameters per objective
# These settings control autofocus behavior during image acquisition
#
# STANDARD AUTOFOCUS (initial focus on first tissue position):
#   n_steps: Number of Z positions to sample (higher = more accurate but slower)
#   search_range_um: Total Z range to search in micrometers
#   interp_strength: Interpolation density factor (typical: 50-200)
#   interp_kind: Interpolation method - 'linear', 'quadratic', or 'cubic'
#
# SWEEP DRIFT CHECK (in-acquisition focus correction):
#   sweep_range_um: Total Z range for drift check (default 10 = +/-5um)
#   sweep_n_steps: Number of Z positions to sample (default 6)
#
# SHARED:
#   n_tiles: Autofocus runs every N tiles (lower = more frequent)
#            Also sets af_min_distance = n_tiles x mean(camera FOV)
#   score_metric: 'normalized_variance' (recommended), 'laplacian_variance',
#                 'sobel', 'brenner_gradient', or 'p98_p2'
#   texture_threshold: Min texture variance for tissue detection (0.005-0.030)
#   tissue_area_threshold: Min tissue coverage fraction (0.05-0.30)
#
# AF SAFETY NETS (force an extra autofocus when the planned grid is sparse):
#   gap_index_multiplier: force AF after (this x n_tiles) positions without one
#                         Default 3, typical 1-5. Lower = more aggressive safety net.
#   gap_spatial_multiplier: force AF beyond (this x af_min_distance) from nearest AF
#                           Default 2.0, typical 1.0-3.0. Catches disconnected fragments.

schema_version: 2
autofocus_settings:
- objective: LOCI_OBJECTIVE_OLYMPUS_10X_001
  calibrated: true
  n_steps: 35
  search_range_um: 50.0
  n_tiles: 4
  interp_strength: 100
  interp_kind: quadratic
  score_metric: normalized_variance
  texture_threshold: 0.005
  tissue_area_threshold: 0.2
  sweep_range_um: 50.0
  sweep_n_steps: 3
  edge_retries: 2
  gap_index_multiplier: 3
  gap_spatial_multiplier: 2.0
- objective: LOCI_OBJECTIVE_OLYMPUS_20X_POL_001
  calibrated: true
  n_steps: 40
  search_range_um: 30.0
  n_tiles: 3
  interp_strength: 100
  interp_kind: quadratic
  score_metric: normalized_variance
  texture_threshold: 0.005
  tissue_area_threshold: 0.2
  sweep_range_um: 6.0
  sweep_n_steps: 3
  edge_retries: 2
  gap_index_multiplier: 3
  gap_spatial_multiplier: 2.0
- objective: LOCI_OBJECTIVE_OLYMPUS_40X_POL_001
  calibrated: true
  n_steps: 15
  search_range_um: 12.0
  n_tiles: 7
  interp_strength: 100
  interp_kind: quadratic
  score_metric: normalized_variance
  texture_threshold: 0.005
  tissue_area_threshold: 0.2
  sweep_range_um: 6.0
  sweep_n_steps: 4
  edge_retries: 2
  gap_index_multiplier: 3
  gap_spatial_multiplier: 2.0
strategies:
  dense_texture:
    description: H&E, IHC, PPM, confluent IF. Requires both sufficient gradient texture
      AND a significant tissue-area fraction.
    score_metric: laplacian_variance
    validity_check: texture_and_area
    validity_params:
      texture_threshold: 0.01
      tissue_area_threshold: 0.2
      rgb_brightness_threshold: 240.0
      tissue_mask_range:
      - 0.1
      - 0.9
      median_floor: 15.0
    on_failure: defer
  manual_only:
    description: Skip auto entirely. Always prompts the user.
    score_metric: none
    validity_check: always_false
    validity_params: {
      }
    on_failure: manual
modalities:
  ppm:
    strategy: dense_texture
    overrides:
      validity_params:
        tissue_mask_range:
        - 0.05
        - 0.95
        texture_threshold: 0.005
  brightfield:
    strategy: dense_texture
  bf:
    strategy: dense_texture
