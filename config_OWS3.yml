# ========== OWS3 MICROSCOPE CONFIGURATION ==========
# Nikon Ti2-E inverted microscope
#   Brightfield: Hamamatsu ORCA sCMOS + DiaLamp transmitted illumination
#   Two-photon:  OpenScan OSc-LSM scan engine + Ti:Sapphire MaiTai laser
#                Pockels cell for power control, BH DCU PMT detectors,
#                Arduino-controlled detector shutters
#
# NOTE: The BF and 2P configs currently use DIFFERENT MM .cfg files
# with different stage inversion settings (BF: Invert-X=Yes, 2P: Invert-X=No).
# When merged into a single MM config, stage inversion must be reconciled.
#
# Component mapping:
#   Camera (BF):   HamamatsuHam_DCAM (monochrome sCMOS)
#   Camera (2P):   OSc-LSM (OpenScan laser scanning, 256-2048 resolution)
#   Stage:         Nikon Ti2 built-in XYStage + ZDrive
#   Illumination:  DiaLamp (BF) / Pockels cell NIDAQAO-Dev2/ao1 (2P)
#   Detector:      Camera-only (BF) / DCU PMT 4-channel (2P)
#   Shutter (2P):  LaserShutter (NI digital IO) + Arduino detector shutters
#   RotationStage: None

microscope:
  name: 'OWS3'
  type: 'Multimodal'
  detector_in_use: null    # Set at runtime
  objective_in_use: null   # Set at runtime
  modality: null           # Set at runtime

# ========== MODALITY-SPECIFIC SETTINGS ==========
modalities:
  brightfield:
    type: 'brightfield'
    illumination:
      device: 'DiaLamp'
      type: 'device_property'
      state_property: 'State'
      intensity_property: 'Intensity'
      max_intensity: 2100.0
      label: 'DiaLamp'
    background_correction:
      enabled: true
      method: 'divide'

  2p:
    type: 'multiphoton'
    laser:
      device: 'MaiTai'         # Ti:Sapphire laser (external, not MM-controlled)
      wavelength_nm: 800
      wavelength_range_nm: [690, 1040]
    pockels_cell:
      device: 'NIDAQAO-Dev2/ao1'
      type: 'analog_voltage'
      property: 'Voltage'
      max_voltage: 1.0
      label: 'Pockels Cell'
    pmt:
      device: 'DCUModule1'
      type: 'dcu'
      connector: 1             # C1 = Bottom epi PMT (primary SHG/2P)
      max_gain_percent: 100.0
    shutter:
      device: 'LaserShutter'   # State Device Shutter wrapping NI digital IO
    detector_shutters:
      device: 'Arduino-Switch'
      # Arduino state values for different PMT routing:
      #   0 = Closed (analog)
      #   2 = Open (Analog detector) -- bottom PMT only
      #   3 = Open (FLIM detector) -- BH TCSPC
      #   6 = Open (Tree + Analog) -- side PMTs + bottom
      #   7 = Open (Tree + Bottom + FLIM) -- all detectors
    background_correction:
      enabled: false

# ========== DETECTOR CONFIGURATION ==========
id_detector:
  OWS3_DETECTOR_HAMAMATSU_001:
    name: 'Hamamatsu ORCA'
    camera_type: 'generic'
    device: 'HamamatsuHam_DCAM'
    width_px: 2048
    height_px: 2048
    sensor_pixel_width_um: 6.5
    sensor_pixel_height_um: 6.5
    flip_x: false
    flip_y: false
    compatible_modalities:
      - 'brightfield'

  OWS3_PMT_BOTTOM_001:
    name: 'Bottom Epi PMT (SHG/2P)'
    camera_type: 'laser_scanning'
    device: 'OSc-LSM'
    width_px: 512
    height_px: 512
    base_pixel_size_um: 0.509
    flip_x: false
    flip_y: false
    compatible_modalities:
      - '2p'
      - 'shg'

# ========== OBJECTIVE CONFIGURATION ==========
hardware:
  objectives:
    - id: 'OWS3_OBJECTIVE_NIKON_10X_001'
      nosepiece_state: 1
      pixel_size_xy_um:
        OWS3_DETECTOR_HAMAMATSU_001: 0.6502
        OWS3_PMT_BOTTOM_001: 0.5197    # LSM at 256 resolution

    - id: 'OWS3_OBJECTIVE_NIKON_20X_001'
      nosepiece_state: 2
      pixel_size_xy_um:
        OWS3_DETECTOR_HAMAMATSU_001: 0.3248
        OWS3_PMT_BOTTOM_001: 0.2762    # LSM at 256 resolution

    - id: 'OWS3_OBJECTIVE_NIKON_40X_WATER_001'
      nosepiece_state: 3
      pixel_size_xy_um:
        OWS3_DETECTOR_HAMAMATSU_001: 0.16
        OWS3_PMT_BOTTOM_001: 0.3469    # LSM at 256 resolution

    - id: 'OWS3_OBJECTIVE_NIKON_40X_OIL_001'
      nosepiece_state: 4
      pixel_size_xy_um:
        OWS3_DETECTOR_HAMAMATSU_001: 0.16
        OWS3_PMT_BOTTOM_001: 0.133     # LSM at 256 resolution

    - id: 'OWS3_OBJECTIVE_NIKON_60X_OIL_001'
      nosepiece_state: 5
      pixel_size_xy_um:
        OWS3_DETECTOR_HAMAMATSU_001: 0.11
        OWS3_PMT_BOTTOM_001: 0.4892    # LSM at 256 resolution

  detectors:
    - 'OWS3_DETECTOR_HAMAMATSU_001'
    - 'OWS3_PMT_BOTTOM_001'

# ========== ACQUISITION PROFILES ==========
# Each profile combines a modality + objective + detector + setup presets.
# The --scan-type flag from Java maps to a profile name.
acquisition_profiles:

  # --- Brightfield profiles ---
  bf_10x:
    modality: 'brightfield'
    objective: 'OWS3_OBJECTIVE_NIKON_10X_001'
    detector: 'OWS3_DETECTOR_HAMAMATSU_001'
    illumination_intensity: 1000
    mm_setup_presets:
      - group: 'Light Path'
        preset: '2-R100 (BF Camera)'
      - group: 'Lens Turret'
        preset: 'Nikon 10x 0.5NA air'

  bf_20x:
    modality: 'brightfield'
    objective: 'OWS3_OBJECTIVE_NIKON_20X_001'
    detector: 'OWS3_DETECTOR_HAMAMATSU_001'
    illumination_intensity: 1200
    mm_setup_presets:
      - group: 'Light Path'
        preset: '2-R100 (BF Camera)'
      - group: 'Lens Turret'
        preset: 'Nikon 20x 0.75NA air'

  bf_40x_water:
    modality: 'brightfield'
    objective: 'OWS3_OBJECTIVE_NIKON_40X_WATER_001'
    detector: 'OWS3_DETECTOR_HAMAMATSU_001'
    illumination_intensity: 1500
    mm_setup_presets:
      - group: 'Light Path'
        preset: '2-R100 (BF Camera)'
      - group: 'Lens Turret'
        preset: 'Nikon 40x 1.15NA LWD'

  bf_40x_oil:
    modality: 'brightfield'
    objective: 'OWS3_OBJECTIVE_NIKON_40X_OIL_001'
    detector: 'OWS3_DETECTOR_HAMAMATSU_001'
    illumination_intensity: 1500
    mm_setup_presets:
      - group: 'Light Path'
        preset: '2-R100 (BF Camera)'
      - group: 'Lens Turret'
        preset: 'Nikon 40x 1.30NA oil'

  bf_60x:
    modality: 'brightfield'
    objective: 'OWS3_OBJECTIVE_NIKON_60X_OIL_001'
    detector: 'OWS3_DETECTOR_HAMAMATSU_001'
    illumination_intensity: 1800
    mm_setup_presets:
      - group: 'Light Path'
        preset: '2-R100 (BF Camera)'
      - group: 'Lens Turret'
        preset: 'Nikon 60x 1.40NA oil'

  # --- Two-photon profiles ---
  # NOTE: These presets reference the 2P MM config (2P_simplified.cfg).
  # When the BF and 2P configs are merged, verify preset names still match.

  2p_20x:
    modality: '2p'
    objective: 'OWS3_OBJECTIVE_NIKON_20X_001'
    detector: 'OWS3_PMT_BOTTOM_001'
    lsm_resolution: 512
    lsm_pixel_rate_hz: 250000.0
    pockels_power: 0.4            # Fraction of max voltage (0.0-1.0)
    pmt_gain: 0.60                # Fraction of max HV (0.0-1.0)
    mm_setup_presets:
      - group: 'Epi Channel: Laser/LED (LAPP)'
        preset: 'Ti:Sapphire Laser'
      - group: 'Filter Turret'
        preset: 'FLIM and two photon filter + 680 sp'
      - group: 'Channels'
        preset: 'Epi Bottom PMT'
      - group: 'Detector Shutters'
        preset: 'Open (Analog detector)'
      - group: 'PMT Gain'
        preset: 'Ch1 60%'
      - group: 'PMT Power (HV)'
        preset: 'On'
      - group: 'Resolution (pixels)'
        preset: '512'
      - group: 'Pixel Rate (Hz)'
        preset: '250000.0000'
      - group: 'Lens Turret'
        preset: 'Nikon 20x 0.75NA air'

  2p_20x_highres:
    modality: '2p'
    objective: 'OWS3_OBJECTIVE_NIKON_20X_001'
    detector: 'OWS3_PMT_BOTTOM_001'
    lsm_resolution: 1024
    lsm_pixel_rate_hz: 125000.0
    pockels_power: 0.4
    pmt_gain: 0.60
    mm_setup_presets:
      - group: 'Epi Channel: Laser/LED (LAPP)'
        preset: 'Ti:Sapphire Laser'
      - group: 'Filter Turret'
        preset: 'FLIM and two photon filter + 680 sp'
      - group: 'Channels'
        preset: 'Epi Bottom PMT'
      - group: 'Detector Shutters'
        preset: 'Open (Analog detector)'
      - group: 'PMT Gain'
        preset: 'Ch1 60%'
      - group: 'PMT Power (HV)'
        preset: 'On'
      - group: 'Resolution (pixels)'
        preset: '1024'
      - group: 'Pixel Rate (Hz)'
        preset: '125000.0000'
      - group: 'Lens Turret'
        preset: 'Nikon 20x 0.75NA air'

  2p_40x_water:
    modality: '2p'
    objective: 'OWS3_OBJECTIVE_NIKON_40X_WATER_001'
    detector: 'OWS3_PMT_BOTTOM_001'
    lsm_resolution: 512
    lsm_pixel_rate_hz: 250000.0
    pockels_power: 0.4
    pmt_gain: 0.60
    mm_setup_presets:
      - group: 'Epi Channel: Laser/LED (LAPP)'
        preset: 'Ti:Sapphire Laser'
      - group: 'Filter Turret'
        preset: 'FLIM and two photon filter + 680 sp'
      - group: 'Channels'
        preset: 'Epi Bottom PMT'
      - group: 'Detector Shutters'
        preset: 'Open (Analog detector)'
      - group: 'PMT Gain'
        preset: 'Ch1 60%'
      - group: 'PMT Power (HV)'
        preset: 'On'
      - group: 'Resolution (pixels)'
        preset: '512'
      - group: 'Pixel Rate (Hz)'
        preset: '250000.0000'
      - group: 'Lens Turret'
        preset: 'Nikon 40x 1.30NA LWD'

  2p_40x_oil:
    modality: '2p'
    objective: 'OWS3_OBJECTIVE_NIKON_40X_OIL_001'
    detector: 'OWS3_PMT_BOTTOM_001'
    lsm_resolution: 512
    lsm_pixel_rate_hz: 250000.0
    pockels_power: 0.4
    pmt_gain: 0.55
    mm_setup_presets:
      - group: 'Epi Channel: Laser/LED (LAPP)'
        preset: 'Ti:Sapphire Laser'
      - group: 'Filter Turret'
        preset: 'FLIM and two photon filter + 680 sp'
      - group: 'Channels'
        preset: 'Epi Bottom PMT'
      - group: 'Detector Shutters'
        preset: 'Open (Analog detector)'
      - group: 'PMT Gain'
        preset: 'Ch1 55% (for analog)'
      - group: 'PMT Power (HV)'
        preset: 'On'
      - group: 'Resolution (pixels)'
        preset: '512'
      - group: 'Pixel Rate (Hz)'
        preset: '250000.0000'
      - group: 'Lens Turret'
        preset: 'Nikon 40x 1.30NA oil (offset 20250722)'

# ========== PMT SAFETY ==========
# CRITICAL: These devices are closed/disabled BEFORE any light path or
# illumination change to prevent PMT damage from bright light.
# All states are explicit strings, never booleans.
pmt_safety:
  detector_shutter:
    device: 'Arduino-Switch'
    # Use ConfigGroup preset for reliable multi-property atomic set
    preset_group: 'Detector Shutters'
    closed_preset: 'Closed and Off'
  laser_shutter:
    device: 'LaserShutter'
    closed_state: '0'

# ========== STAGE CONFIGURATION ==========
stage:
  stage_id: 'OWS3_STAGE_NIKON_TI2_001'
  z_stage: 'ZDrive'
  # Stage inversion: BF and 2P MM configs use different Invert-X settings.
  #   BF config (Ti2e-Ham.cfg):     Invert-X=Yes, Invert-Y=No
  #   2P config (2P_simplified.cfg): Invert-X=No,  Invert-Y=No
  # Invert-X is a pre-init property -- cannot be changed at runtime.
  #
  # When the configs are merged into a single .cfg, set the MM Invert-X
  # to match the 2P config (No), then add stage_invert_x_correction: true
  # to all BF acquisition profiles. The acquisition pipeline will apply
  # the correction in software (flip X coordinates / images).
  #
  # While using separate .cfg files this flag is not needed.
  invert_x: true
  invert_y: false
  limits:
    x_um:
      low: -60000
      high: 60000
    y_um:
      low: -40000
      high: 40000
    z_um:
      low: -10000
      high: 10000

# ========== AUTOFOCUS CONFIGURATION ==========
# Autofocus parameters are in a SEPARATE file: autofocus_OWS3.yml
# The acquisition workflow derives the filename from this config's name.
# Each objective must have calibrated: true before autofocus will run.
# See autofocus_OWS3.yml or run the Autofocus Benchmark utility.

# ========== TILE OVERLAP ==========
tile_overlap_percent: 10.0
