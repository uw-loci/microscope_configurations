      device_properties:
      - device: DiaLamp
        property: State
        value: 0
      - device: DLED
        property: State
        value: 1
      - device: DLED
        property: Enable-385nm
        value: 'Off'
      - device: DLED
        property: Enable-475nm
        value: 'On'
      - device: DLED
        property: Enable-550nm
        value: 'Off'
      - device: DLED
        property: Enable-621nm
        value: 'Off'
      - device: DLED
        property: Intensity-385nm
        value: 0
      - device: DLED
        property: Intensity-475nm
        value: 30
      - device: DLED
        property: Intensity-550nm
        value: 0
      - device: DLED
