microscope:
  name: OWS3
  type: Multimodal
  detector_in_use: null
  objective_in_use: null
  modality: null
modalities:
  Brightfield:
    type: brightfield
    illumination:
      device: DiaLamp
      type: device_property
      state_property: State
      intensity_property: Intensity
      max_intensity: 2100.0
      label: DiaLamp
    background_correction:
      enabled: true
      method: divide
      base_folder: C:/QPSC/Data/background_tiles
  Fluorescence:
    type: widefield
    illumination:
      device: LappMainBranch1
      type: device_property
      state_property: State
      intensity_property: State
      max_intensity: 1.0
      label: Epi LED
    background_correction:
      enabled: false
      method: divide
      base_folder: ''
hardware:
  objectives:
  - id: 0.5NA_AIR_10x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.6502
  - id: 0.75NA_AIR_20x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.3248
  - id: 1.15NA_WATER_LWD_40x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.16
  - id: 1.3NA_OIL_40x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.16
  - id: 1.4NA_OIL_60x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.11
  detectors:
  - HAMAMATSU_DCAM_01
id_detector:
  HAMAMATSU_DCAM_01:
    name: Hamamatsu Camera
    camera_type: generic
    device: HamamatsuHam_DCAM
    width_px: 2048
    height_px: 2048
    flip_x: false
    flip_y: false
    background_target_intensity: 51200
stage:
  stage_id: LOCI_STAGE_OWS3
  z_stage: ZDrive
  limits:
    x_um:
      low: -36000.0
      high: 36000.0
    y_um:
      low: -39000.0
      high: 39000.0
    z_um:
      low: 0.0
      high: 2000.0
slide_size_um:
  x: 40000
  y: 20000
acquisition_profiles:
  # Keys match the scan_type prefix sent by the Java extension,
  # which is "<Modality>_<Objective>" (e.g. "Brightfield_10x").
  # apply_mode_setup strips the trailing "_<counter>" suffix before
  # looking up the profile.
  Brightfield_10x:
    modality: Brightfield
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (BF Camera)
    - group: Epi Shutter
      preset: Closed
    illumination_intensity: 500
  Brightfield_20x:
    modality: Brightfield
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (BF Camera)
    - group: Epi Shutter
      preset: Closed
    illumination_intensity: 500
  Brightfield_40x:
    modality: Brightfield
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (BF Camera)
    - group: Epi Shutter
      preset: Closed
    illumination_intensity: 500
  Brightfield_60x:
    modality: Brightfield
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (BF Camera)
    - group: Epi Shutter
      preset: Closed
    illumination_intensity: 500
  Fluorescence_10x:
    modality: Fluorescence
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (Epi Camera)
    - group: Epi Shutter
      preset: Open
    - group: 'Epi Channel: Laser/LED (LAPP)'
      preset: Epi LED (DLEDI)
    - group: Filter Turret
      preset: Single photon LED-DA FI TR Cy5-B
    illumination_intensity: 1.0
  Fluorescence_20x:
    modality: Fluorescence
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (Epi Camera)
    - group: Epi Shutter
      preset: Open
    - group: 'Epi Channel: Laser/LED (LAPP)'
      preset: Epi LED (DLEDI)
    - group: Filter Turret
      preset: Single photon LED-DA FI TR Cy5-B
    illumination_intensity: 1.0
  Fluorescence_40x:
    modality: Fluorescence
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (Epi Camera)
    - group: Epi Shutter
      preset: Open
    - group: 'Epi Channel: Laser/LED (LAPP)'
      preset: Epi LED (DLEDI)
    - group: Filter Turret
      preset: Single photon LED-DA FI TR Cy5-B
    illumination_intensity: 1.0
  Fluorescence_60x:
    modality: Fluorescence
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
    - group: Light Path
      preset: 2-R100 (Epi Camera)
    - group: Epi Shutter
      preset: Open
    - group: 'Epi Channel: Laser/LED (LAPP)'
      preset: Epi LED (DLEDI)
    - group: Filter Turret
      preset: Single photon LED-DA FI TR Cy5-B
    illumination_intensity: 1.0
