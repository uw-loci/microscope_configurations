hardware:
  objectives:
  - id: 0.5NA_AIR_10x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.6502
  - id: 0.75NA_AIR_20x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.3248
  - id: 1.15NA_WATER_LWD_40x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.16
  - id: 1.3NA_OIL_40x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.16
  - id: 1.4NA_OIL_60x
    pixel_size_xy_um:
      HAMAMATSU_DCAM_01: 0.11
  detectors:
  - HAMAMATSU_DCAM_01
id_detector:
  HAMAMATSU_DCAM_01:
    name: Hamamatsu Camera
    camera_type: generic
    device: HamamatsuHam_DCAM
    width_px: 2048
    height_px: 2048
    flip_x: false
    flip_y: false
    background_target_intensity: 51200
stage:
  stage_id: LOCI_STAGE_OWS3
  z_stage: ZDrive
  limits:
    x_um:
      low: -44500.0
      high: 0.0
    y_um:
      low: -17652.0
      high: 13395.0
    z_um:
      low: 0.0
      high: 2400.0
  streaming_af:
    enabled: true
    speed_property: Speed
    slow_speed_value: 0.50mm/sec
    slow_speed_um_per_s: 6.079
    normal_speed_value: 2.50mm/sec
slide_size_um:
  x: 40000
  y: 20000
acquisition_profiles:
  Brightfield_10x:
    modality: Brightfield
    detector: HAMAMATSU_DCAM_01
    mm_setup_presets:
