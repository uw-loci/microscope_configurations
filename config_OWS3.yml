microscope:
  name: OWS3
  type: Multimodal
  detector_in_use: null
  objective_in_use: null
  modality: null
modalities:
  Brightfield:
    type: brightfield
    illumination:
      device: DiaLamp
      type: device_property
      state_property: State
      intensity_property: Intensity
      max_intensity: 2100.0
      label: DiaLamp
    background_correction:
      enabled: true
      method: divide
      base_folder: C:/QPSC/Data/background_tiles
  Fluorescence:
    type: widefield
    illumination:
      device: LappMainBranch1
      type: device_property
      state_property: State
      intensity_property: State
      max_intensity: 1.0
      label: Epi LED
    background_correction:
      enabled: false
      method: divide
      base_folder: ''
    channels:
    - id: DAPI
      display_name: DAPI (385 nm)
      exposure_ms: 100
      intensity_property:
        device: DLED
        property: Intensity-385nm
      mm_setup_presets:
      - group: Light Path
        preset: 2-R100 (Epi Camera)
      - group: Epi Shutter
        preset: Open
      - group: Filter Turret
        preset: Single photon LED-DA FI TR Cy5-B
      device_properties:
      # Brightfield lamp off.
      - device: DiaLamp
        property: State
        value: 0
      # Master DLED switch + per-wavelength gate. On the Nikon Ti2 DLED,
      # Intensity-XXXnm alone does NOT emit -- DLED.State must be 1 and
      # Enable-XXXnm must be On for that wavelength. Without these the
      # APPLYCH succeeds but no light reaches the sample (observed
      # 2026-05-02 on OWS3). Enable the active wavelength, gate the
      # others off so a residual Enable from a prior channel doesn't
      # leak emission.
      - device: DLED
        property: State
        value: 1
      - device: DLED
        property: Enable-385nm
        value: 'On'
      - device: DLED
        property: Enable-475nm
        value: 'Off'
      - device: DLED
        property: Enable-550nm
        value: 'Off'
      - device: DLED
        property: Enable-621nm
        value: 'Off'
      - device: DLED
        property: Intensity-385nm
        value: 25
      - device: DLED
        property: Intensity-475nm
        value: 0
      - device: DLED
        property: Intensity-550nm
        value: 0
      - device: DLED
        property: Intensity-621nm
        value: 0
    - id: FITC
      display_name: FITC (475 nm)
      exposure_ms: 80
      intensity_property:
        device: DLED
        property: Intensity-475nm
      mm_setup_presets:
      - group: Light Path
        preset: 2-R100 (Epi Camera)
      - group: Epi Shutter
        preset: Open
      - group: Filter Turret
        preset: Single photon LED-DA FI TR Cy5-B
      device_properties:
      - device: DiaLamp
        property: State
        value: 0
      - device: DLED
        property: State
        value: 1
      - device: DLED
        property: Enable-385nm
        value: 'Off'
      - device: DLED
        property: Enable-475nm
        value: 'On'
      - device: DLED
        property: Enable-550nm
        value: 'Off'
      - device: DLED
        property: Enable-621nm
        value: 'Off'
      - device: DLED
        property: Intensity-385nm
        value: 0
      - device: DLED
        property: Intensity-475nm
        value: 30
      - device: DLED
        property: Intensity-550nm
        value: 0
      - device: DLED
        property: Intensity-621nm
        value: 0
    - id: TRITC
      display_name: TRITC (550 nm)
      exposure_ms: 120
      intensity_property:
        device: DLED
        property: Intensity-550nm
      mm_setup_presets:
      - group: Light Path
        preset: 2-R100 (Epi Camera)
      - group: Epi Shutter
        preset: Open
      - group: Filter Turret
        preset: Single photon LED-DA FI TR Cy5-B
      device_properties:
      - device: DiaLamp
        property: State
        value: 0
      - device: DLED
        property: State
        value: 1
      - device: DLED
        property: Enable-385nm
        value: 'Off'
      - device: DLED
        property: Enable-475nm
        value: 'Off'
      - device: DLED
        property: Enable-550nm
        value: 'On'
      - device: DLED
        property: Enable-621nm
        value: 'Off'
      - device: DLED
        property: Intensity-385nm
        value: 0
      - device: DLED
        property: Intensity-475nm
        value: 0
      - device: DLED
        property: Intensity-550nm
        value: 30
      - device: DLED
        property: Intensity-621nm
        value: 0
    - id: Cy5
      display_name: Cy5 (621 nm)
      exposure_ms: 200
      intensity_property:
        device: DLED
        property: Intensity-621nm
      mm_setup_presets:
      - group: Light Path
        preset: 2-R100 (Epi Camera)
      - group: Epi Shutter
        preset: Open
      - group: Filter Turret
        preset: Single photon LED-DA FI TR Cy5-B
      device_properties:
      - device: DiaLamp
        property: State
        value: 0
      - device: DLED
        property: State
        value: 1
      - device: DLED
        property: Enable-385nm
        value: 'Off'
      - device: DLED
        property: Enable-475nm
        value: 'Off'
      - device: DLED
        property: Enable-550nm
        value: 'Off'
      - device: DLED
        property: Enable-621nm
        value: 'On'
      - device: DLED
        property: Intensity-385nm
        value: 0
      - device: DLED
        property: Intensity-475nm
        value: 0
      - device: DLED
        property: Intensity-550nm
        value: 0
      - device: DLED
        property: Intensity-621nm
        value: 30
  BF_IF:
    type: bf_if
    illumination:
      device: LappMainBranch1
      type: device_property
      state_property: State
      intensity_property: State
      max_intensity: 1.0
      label: Epi LED
    background_correction:
      enabled: false
      method: divide
      base_folder: ''
    channels:
    - id: BF
      display_name: Brightfield
      exposure_ms: 10
      intensity_property:
        device: DiaLamp
        property: Intensity
      mm_setup_presets:
      - group: Light Path
        preset: 2-R100 (BF Camera)
      - group: Epi Shutter
        preset: Closed
      device_properties:
      - device: DiaLamp
        property: Intensity
        value: 500
      # Force DLED fully off so a stale Enable from a previous fluorescence
      # channel doesn't keep emitting in the BF leg.
      - device: DLED
        property: State
        value: 0
      - device: DLED
        property: Enable-385nm
        value: 'Off'
      - device: DLED
        property: Enable-475nm
        value: 'Off'
      - device: DLED
        property: Enable-550nm
        value: 'Off'
      - device: DLED
        property: Enable-621nm
        value: 'Off'
      - device: DLED
        property: Intensity-385nm
        value: 0
      - device: DLED
        property: Intensity-475nm
        value: 0
      - device: DLED
        property: Intensity-550nm
        value: 0
      - device: DLED
        property: Intensity-621nm
        value: 0
    - id: DAPI
      display_name: DAPI (385 nm)
      exposure_ms: 100
      intensity_property:
